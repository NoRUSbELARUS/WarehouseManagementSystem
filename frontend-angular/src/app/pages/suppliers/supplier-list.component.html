<div class="page-container">
  <div class="page-header">
    <h1>Поставщики</h1>
    <button mat-raised-button color="primary" (click)="openDialog()">
      <mat-icon>add</mat-icon> Добавить поставщика
    </button>
  </div>

  <table mat-table [dataSource]="suppliers" class="mat-elevation-z8 full-width">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Компания </th>
      <td mat-cell *matCellDef="let s"> {{s.name}} </td>
    </ng-container>
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef> Контактный Email </th>
      <td mat-cell *matCellDef="let s"> {{s.contactEmail}} </td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Действия </th>
      <td mat-cell *matCellDef="let s">
        <button mat-icon-button color="primary" (click)="openDialog(s)"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button color="warn" (click)="deleteSupplier(s.id)"><mat-icon>delete</mat-icon></button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
