<div class="page-container">
  <div class="page-header">
    <h1>Управление персоналом</h1>
    <button mat-raised-button color="primary" (click)="openDialog()">
      <mat-icon>person_add</mat-icon> Новый сотрудник
    </button>
  </div>

  <table mat-table [dataSource]="employees" class="mat-elevation-z8 full-width">
    <ng-container matColumnDef="fullName">
      <th mat-header-cell *matHeaderCellDef> ФИО </th>
      <td mat-cell *matCellDef="let e"> {{e.firstName}} {{e.lastName}} </td>
    </ng-container>
    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef> Должность </th>
      <td mat-cell *matCellDef="let e"> {{e.role}} </td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Действия </th>
      <td mat-cell *matCellDef="let e">
        <button mat-icon-button color="primary" (click)="openDialog(e)"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button color="warn" (click)="deleteEmployee(e)"><mat-icon>delete</mat-icon></button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
