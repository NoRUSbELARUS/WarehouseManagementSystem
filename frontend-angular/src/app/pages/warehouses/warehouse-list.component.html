<div class="page-container">
  <div class="page-header">
    <h1>Склады и ячейки</h1>
    <button mat-raised-button color="primary" (click)="openWhDialog()">
      <mat-icon>add_business</mat-icon> Добавить склад
    </button>
  </div>

  <!-- ТАБЛИЦА СКЛАДОВ -->
  <div class="mat-elevation-z8 table-wrapper">
    <table mat-table [dataSource]="warehouses" class="full-width">
      
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Название склада </th>
        <td mat-cell *matCellDef="let w" class="clickable-cell" (click)="loadBins(w)"> 
          {{w.name}} 
          <mat-icon class="view-icon">visibility</mat-icon> 
        </td>
      </ng-container>

      <ng-container matColumnDef="address">
        <th mat-header-cell *matHeaderCellDef> Адрес </th>
        <td mat-cell *matCellDef="let w"> {{w.address}} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef style="text-align: center;"> Действия </th>
        <td mat-cell *matCellDef="let w" style="text-align: center;">
          <button mat-icon-button color="primary" (click)="$event.stopPropagation(); openWhDialog(w)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="$event.stopPropagation(); deleteWh(w.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" 
          [class.selected-row]="selectedWh?.id === row.id"></tr>
    </table>
  </div>

  <!-- ТАБЛИЦА ЯЧЕЕК (Появляется только когда выбран склад) -->
  <mat-card *ngIf="selectedWh" class="details-card">
    <mat-card-header>
      <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
        <mat-card-title>Ячейки склада: {{selectedWh.name}}</mat-card-title>
        <button mat-flat-button color="accent" size="small" (click)="openBinDialog()">
          <mat-icon>add</mat-icon> Добавить ячейку
        </button>
      </div>
    </mat-card-header>

    <mat-card-content style="margin-top: 20px;">
      <table mat-table [dataSource]="bins" class="full-width">
        <ng-container matColumnDef="code">
          <th mat-header-cell *matHeaderCellDef> Код ячейки </th>
          <td mat-cell *matCellDef="let b"> {{b.binCode}} </td>
        </ng-container>
        
        <ng-container matColumnDef="zone">
          <th mat-header-cell *matHeaderCellDef> Зона </th>
          <td mat-cell *matCellDef="let b"> {{b.zone}} </td>
        </ng-container>

        <ng-container matColumnDef="binActions">
          <th mat-header-cell *matHeaderCellDef style="width: 100px;"> </th>
          <td mat-cell *matCellDef="let b">
            <button mat-icon-button (click)="openBinDialog(b)"><mat-icon>edit</mat-icon></button>
            <button mat-icon-button color="warn" (click)="deleteBin(b.id)"><mat-icon>delete</mat-icon></button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="binColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: binColumns;"></tr>
      </table>
      
      <div *ngIf="bins.length === 0" style="padding: 20px; text-align: center; color: gray;">
        На этом складе пока нет ячеек.
      </div>
    </mat-card-content>
  </mat-card>
</div>
