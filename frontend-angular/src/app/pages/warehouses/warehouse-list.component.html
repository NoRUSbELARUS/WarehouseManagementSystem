<div class="page-container">
  <div class="page-header">
    <h1>Склады и ячейки</h1>
    <button mat-raised-button color="primary" (click)="openWhDialog()">
      <mat-icon>add_business</mat-icon> Добавить склад
    </button>
  </div>

  <table mat-table [dataSource]="warehouses" class="mat-elevation-z8 full-width">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Название склада </th>
      <td mat-cell *matCellDef="let w" (click)="loadBins(w)" class="clickable-cell"> 
        {{w.name}} <mat-icon style="font-size: 14px;">visibility</mat-icon>
      </td>
    </ng-container>
    <ng-container matColumnDef="address">
      <th mat-header-cell *matHeaderCellDef> Адрес </th>
      <td mat-cell *matCellDef="let w"> {{w.address}} </td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Действия </th>
      <td mat-cell *matCellDef="let w">
        <button mat-icon-button color="primary" (click)="openWhDialog(w)"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button color="warn" (click)="deleteWh(w.id)"><mat-icon>delete</mat-icon></button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-card *ngIf="selectedWh" class="details-card">
    <mat-card-header>
      <mat-card-title>Ячейки склада: {{selectedWh.name}}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="bins" class="full-width">
        <ng-container matColumnDef="code">
          <th mat-header-cell *matHeaderCellDef> Код ячейки </th>
          <td mat-cell *matCellDef="let b"> {{b.binCode}} </td>
        </ng-container>
        <ng-container matColumnDef="zone">
          <th mat-header-cell *matHeaderCellDef> Зона </th>
          <td mat-cell *matCellDef="let b"> {{b.zone}} </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="['code', 'zone']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['code', 'zone'];"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
