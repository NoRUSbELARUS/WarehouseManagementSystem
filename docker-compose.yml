services:
  db:
    image: postgres:15
    container_name: wms-db
    restart: always
    environment:
      POSTGRES_DB: wms_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database_queries:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wms_system"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: wms-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/wms_system
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=your_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  react-app:
    build: ./frontend-react/wms-frontend
    container_name: wms-react
    ports:
      - "5173:80"
    depends_on:
      - backend

  angular-app:
    build: ./frontend-angular
    container_name: wms-angular
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
